name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db

jobs:

  # ============================================================
  # JOB 0: DETECTAR QUÉ CAMBIÓ
  # ============================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      db: ${{ steps.filter.outputs.db }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0    
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          backend:
            - 'backend/**'
          db:
            - 'db/**'

    - name: Debug outputs
      run: |
        echo "frontend: ${{ steps.filter.outputs.frontend }}"
        echo "backend: ${{ steps.filter.outputs.backend }}"
        echo "db: ${{ steps.filter.outputs.db }}"
        echo "Archivos cambiados:"
        git diff --name-only HEAD~1 HEAD

  # ============================================================
  # JOB 1: BUILD & DEPLOY FRONTEND (solo si cambió /frontend)
  # ============================================================
  deploy-frontend:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push FRONTEND (con caché)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build \
            --cache-from $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest \
            -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Deploy FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/frontend-service.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-frontend -n $EKS_NAMESPACE

      - name: Aplicar HPA Frontend (si existe)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f k8s/frontend-hpa.yaml ]; then
            kubectl apply -f k8s/frontend-hpa.yaml -n $EKS_NAMESPACE
          fi

  # ============================================================
  # JOB 2: BUILD & DEPLOY BACKEND (solo si cambió /backend)
  # ============================================================
  deploy-backend:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push BACKEND (con caché)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build \
            --cache-from $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Aplicar manifests base (namespace, DB)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-service.yaml -n $EKS_NAMESPACE

      - name: Deploy BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/backend-service.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/tienda-backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-backend -n $EKS_NAMESPACE

      - name: Aplicar HPA Backend (si existe)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f k8s/backend-hpa.yaml ]; then
            kubectl apply -f k8s/backend-hpa.yaml -n $EKS_NAMESPACE
          fi

  # ============================================================
  # JOB 3: BUILD & DEPLOY DB (solo si cambió /db)
  # ============================================================
  deploy-db:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.db == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push DB (con caché)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build \
            --cache-from $ECR_REGISTRY/${ECR_REPO_DB}:latest \
            -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_DB}:latest \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:latest

  # ============================================================
  # JOB 4: VER ESTADO FINAL (corre después de los 3 jobs)
  # ============================================================
  status:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-db]
    if: always()

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Ver pods y servicios
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE || true